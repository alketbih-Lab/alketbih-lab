<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alketbih Lab</title>

    <style>
        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fb;
            color:#333;
            text-align:center;
        }

        header{
            background:#111827;
            color:white;
            padding:60px 20px;
        }

        h1{
            font-size:48px;
            margin-bottom:10px;
        }

        p{
            font-size:20px;
        }

        .button{
            display:inline-block;
            margin-top:30px;
            padding:15px 30px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:12px;
            font-size:18px;
        }

        .section{
            padding:60px 20px;
        }

        .card{
            display:inline-block;
            width:250px;
            margin:15px;
            padding:25px;
            background:white;
            border-radius:16px;
            box-shadow:0 5px 20px rgba(0,0,0,.1);
        }
    </style>

</head>

<body>

<header>

<h1>🚀 Alketbih Lab</h1>

<p>Building • Learning • Creating</p>

<a class="button" href="#">Explore Projects</a>

</header>

<div class="section">

<div class="card">
<h2>🖨️</h2>
<h3>3D Printing</h3>
<p>Designs and Prints</p>
</div>

<div class="card">
<h2>⚡</h2>
<h3>Arduino</h3>
<p>Electronics Projects</p>
</div>

<div class="card">
<h2>📝</h2>
<h3>Blog</h3>
<p>Learning Journey</p>
</div>

</div>

</body>
</html>
